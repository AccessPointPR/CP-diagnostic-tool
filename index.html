<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico de Equipo — CenterPoint</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff;--bg2:#f7f7f5;--bg3:#ebebeb;--t1:#111;--t2:#5f6368;--t3:#9aa0a6;--b1:rgba(0,0,0,.10);--b2:rgba(0,0,0,.20);--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--t1:#f0f0f0;--t2:#aeaeb2;--t3:#6e6e73;--b1:rgba(255,255,255,.10);--b2:rgba(255,255,255,.20)}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);padding:20px 16px 32px;font-size:14px;line-height:1.5;max-width:640px;margin:0 auto}
.screen{display:none;animation:fi .18s ease}
.screen.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.prog-wrap{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:24px}
.prog-fill{height:100%;border-radius:2px;transition:width .3s ease}
.q-meta{font-size:10.5px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.q-dim-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.q-text{font-size:16px;line-height:1.65;color:var(--t1);margin-bottom:28px;min-height:52px}
.scale-ends{display:flex;justify-content:space-between;font-size:10.5px;color:var(--t3);margin-bottom:8px}
.scale-btns{display:flex;gap:7px}
.sbtn{flex:1;padding:12px 4px;border-radius:var(--r);border:1px solid var(--b1);cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;background:var(--bg2);color:var(--t2);transition:all .1s;text-align:center}
.sbtn:hover{border-color:var(--b2);color:var(--t1);background:var(--bg)}
.intro-logo{font-size:13px;font-weight:500;letter-spacing:.03em;color:var(--t3);margin-bottom:24px}
.intro-title{font-size:22px;font-weight:500;color:var(--t1);margin-bottom:8px}
.intro-sub{font-size:13.5px;color:var(--t2);line-height:1.7;margin-bottom:12px}
.intro-note{font-size:12px;color:var(--t3);background:var(--bg2);border-radius:var(--r);padding:11px 14px;line-height:1.65;margin-bottom:20px}
.field-group{margin-bottom:14px}
.field-label{font-size:11.5px;font-weight:500;color:var(--t2);margin-bottom:5px}
.field-input{width:100%;padding:10px 14px;border-radius:var(--r);border:1px solid var(--b1);font-family:inherit;font-size:13.5px;background:var(--bg2);color:var(--t1);outline:none;transition:border-color .12s}
.field-input:focus{border-color:var(--b2)}
.start-btn{width:100%;padding:13px;border-radius:var(--r);border:none;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;color:#fff;transition:opacity .15s;margin-top:6px}
.start-btn:hover{opacity:.86}
.start-btn:disabled{opacity:.35;cursor:not-allowed}
.card{background:var(--bg);border:0.5px solid var(--b1);border-radius:var(--rl);padding:14px 16px;margin-bottom:12px}
.card-title{font-size:10.5px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.res-badge{display:inline-block;padding:4px 14px;border-radius:16px;font-size:11px;font-weight:500;margin-bottom:10px}
.res-name{font-size:22px;font-weight:500;color:var(--t1);margin-bottom:3px}
.res-sub{font-size:13px;color:var(--t2);margin-bottom:10px}
.res-insight{font-size:13px;color:var(--t2);line-height:1.7;padding:11px 14px;background:var(--bg2);border-radius:var(--r);margin-bottom:6px}
.res-gap{font-size:12.5px;color:var(--t2);line-height:1.7;padding:11px 14px;background:var(--bg2);border-radius:var(--r);margin-bottom:18px;border-left:3px solid #64B450}
.dim-row{margin-bottom:11px}
.dim-row:last-child{margin-bottom:0}
.dim-hd{display:flex;justify-content:space-between;margin-bottom:4px}
.dim-lbl{font-size:12px;font-weight:500;color:var(--t1)}
.dim-sc{font-size:12px;color:var(--t2)}
.dim-bg{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.dim-fill{height:100%;border-radius:4px;transition:width .7s ease}
.blocker-card{border-radius:var(--rl);padding:14px 16px;margin-bottom:12px;border-left:4px solid}
.blocker-label{font-size:10.5px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.blocker-text{font-size:12.5px;line-height:1.65}
.rec-item{padding:10px 0;border-bottom:0.5px solid var(--b1);font-size:12.5px;line-height:1.6;color:var(--t1);display:flex;gap:9px;align-items:flex-start}
.rec-item:last-child{border-bottom:none}
.rec-tag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.btn-row{display:flex;gap:8px;margin-top:4px}
.cta-btn{flex:1;padding:13px;border-radius:var(--r);border:none;font-family:inherit;font-size:13.5px;font-weight:500;cursor:pointer;color:#fff;transition:opacity .15s}
.cta-btn:hover{opacity:.86}
.pdf-btn{flex:1;padding:13px;border-radius:var(--r);border:1px solid var(--b1);font-family:inherit;font-size:13.5px;font-weight:500;cursor:pointer;background:var(--bg2);color:var(--t1);transition:all .12s}
.pdf-btn:hover{border-color:var(--b2);background:var(--bg)}
.pdf-btn.loading{opacity:.5;cursor:wait}
.restart-btn{width:100%;padding:10px;border-radius:var(--r);border:0.5px solid var(--b1);font-family:inherit;font-size:13px;font-weight:400;cursor:pointer;background:transparent;color:var(--t2);margin-top:8px;transition:all .12s}
.restart-btn:hover{border-color:var(--b2);color:var(--t1)}
.back-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:none;font-family:inherit;font-size:12px;color:var(--t3);cursor:pointer;padding:0;margin-bottom:20px;transition:color .12s}
.back-btn:hover{color:var(--t2)}
.footer{font-size:11px;color:var(--t3);text-align:center;margin-top:20px;letter-spacing:.02em}
.prac-screen-title{font-size:11px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.prac-screen-note{font-size:12.5px;color:var(--t2);line-height:1.65;margin-bottom:16px;padding:10px 14px;background:var(--bg2);border-radius:var(--r)}
.prac-table{width:100%;border-collapse:collapse;margin-bottom:4px}
.prac-table tr{border-bottom:0.5px solid var(--b1)}
.prac-table tr:last-child{border-bottom:none}
.prac-num{font-size:11px;font-weight:500;color:var(--t3);width:20px;padding-right:8px;vertical-align:top;padding-top:13px}
.prac-q{font-size:13px;line-height:1.55;color:var(--t1);vertical-align:top;padding-top:11px;padding-bottom:11px}
.prac-btns-cell{white-space:nowrap;padding-left:12px;vertical-align:middle}
.pbtn{padding:6px 11px;border-radius:var(--r);border:1px solid var(--b1);cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;background:var(--bg2);color:var(--t2);transition:all .1s;margin-left:4px}
.pbtn:first-child{margin-left:0}
.pbtn:hover{border-color:var(--b2);color:var(--t1);background:var(--bg)}
.pbtn.sel{background:#64B450;border-color:#64B450;color:#fff}
</style>
</head>
<body>
<img id="logo-img" src="CP%20logo.png" style="display:none" crossorigin="anonymous">
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const Qs=[
  {q:"En este equipo, las personas se sienten seguras admitiendo errores o diciendo que no saben cómo resolver algo.",dim:"trust"},
  {q:"Los miembros del equipo se muestran como son, sin necesidad de aparentar o guardar las apariencias.",dim:"trust"},
  {q:"Cuando hay desacuerdos o tensiones en el equipo, se abordan de forma directa, sin rodeos ni evasión.",dim:"conflict"},
  {q:"Los conflictos en este equipo terminan siendo productivos, sin dejar heridas ni resentimientos acumulados.",dim:"conflict"},
  {q:"Todos en el equipo tienen claro cuáles son las prioridades y qué se espera de cada persona.",dim:"clarity"},
  {q:"Está claro quién tiene autoridad para decidir qué, sin confusión sobre roles ni duplicación de decisiones.",dim:"clarity"},
  {q:"El equipo tiene formas de trabajar juntos que todos conocen, respetan y siguen consistentemente.",dim:"cohesion"},
  {q:"Los miembros del equipo se sienten genuinamente parte del equipo, no solo un rol o una función dentro de él.",dim:"cohesion"},
  {q:"Las personas del equipo pueden expresar ideas o preocupaciones aunque sean diferentes a lo que piensa el líder.",dim:"psafety"},
  {q:"En este equipo, señalar un problema es valorado, no visto como negatividad o deslealtad.",dim:"psafety"},
  {q:"Las personas cumplen sus compromisos entre ellas, no solo frente al líder o en reuniones formales.",dim:"impact"},
  {q:"Este equipo comparte activamente lo que aprende con personas o equipos fuera de su propio grupo.",dim:"impact"}
];

const Ps=[
  "El equipo ha tenido al menos una sesión facilitada enfocada en cómo trabajan juntos, no en el trabajo en sí.",
  "Los miembros del equipo han completado algún assessment de personalidad o estilos de comunicación juntos (DiSC, StrengthsFinder, MBTI u otro).",
  "Existen acuerdos de trabajo explícitos y documentados: normas sobre cómo se toman decisiones, se resuelven conflictos o se comunican.",
  "Hay un proceso formal para que los miembros del equipo se den retroalimentación entre ellos, no solo del líder al equipo.",
  "Este equipo ha compartido activamente lo que sabe o cómo trabaja con otros equipos o personas fuera de su grupo."
];

const DIMS={
  trust:{label:"Confianza",color:"#14A0B4",bg:"#E3F5F8"},
  conflict:{label:"Gestión del conflicto",color:"#993C1D",bg:"#FAECE7"},
  clarity:{label:"Claridad",color:"#854F0B",bg:"#FAEEDA"},
  cohesion:{label:"Cohesión",color:"#64B450",bg:"#EBF5E6"},
  psafety:{label:"Seguridad psicológica",color:"#534AB7",bg:"#E5E3FC"},
  impact:{label:"Impacto colectivo",color:"#888780",bg:"#F1EFE8"}
};

const BLOCKERS={
  trust:"La confianza es la base de todo. Sin ella, el conflicto se evita, los compromisos son superficiales y la seguridad psicológica es imposible. Este es el punto de palanca más crítico ahora mismo.",
  conflict:"El equipo evita el conflicto o no lo maneja bien. Eso crea tensiones que van por debajo de la superficie y corroen la colaboración sin que nadie lo nombre directamente.",
  clarity:"Hay ambigüedad en objetivos o roles. Cuando cada persona tiene una versión distinta de hacia dónde vamos o quién decide qué, la energía del equipo se fragmenta.",
  cohesion:"El equipo no ha desarrollado normas sólidas ni identidad colectiva. Funciona como grupo de individuos más que como equipo con personalidad propia.",
  psafety:"Las personas no se sienten seguras expresando ideas, errores o preocupaciones libremente. Eso limita la innovación, el aprendizaje colectivo y la confianza profunda.",
  impact:"El equipo funciona bien internamente pero no ha desarrollado accountability mutuo ni orientación hacia afuera. Eso limita su influencia organizacional."
};

const STAGES=[
  {name:"Forming",sub:"Conexión antes que contenido",ac:"#888780",al:"#F1EFE8",ad:"#2C2C2A",
   insight:"Este equipo está en construcción inicial. La prioridad no es la productividad máxima sino la conexión y la claridad de propósito compartido.",
   recs:[
     {tag:"Sesión de trabajo",tc:"#64B450",tb:"#EBF5E6",text:"Taller de team charter: propósito compartido, expectativas mutuas y acuerdos de trabajo desde cero."},
     {tag:"Assessment",tc:"#14A0B4",tb:"#E3F5F8",text:"Momento ideal para DiSC o StrengthsFinder: conocer estilos individuales antes de que se formen patrones difíciles de cambiar."},
     {tag:"Experiencia",tc:"#854F0B",tb:"#FAEEDA",text:"Reto colaborativo de bajo riesgo emocional para construir contexto compartido antes que confianza profunda."}
   ]},
  {name:"Storming",sub:"Estructura antes que armonía",ac:"#993C1D",al:"#FAECE7",ad:"#4A1B0C",
   insight:"Este equipo está en tensión activa. Esto es normal, pero necesita ser nombrado y trabajado, no ignorado con actividades recreativas.",
   recs:[
     {tag:"Sesión de trabajo",tc:"#64B450",tb:"#EBF5E6",text:"Taller de estilos de conflicto (Thomas-Kilmann): dar lenguaje neutro al conflicto cambia la dinámica del equipo."},
     {tag:"Sesión de trabajo",tc:"#64B450",tb:"#EBF5E6",text:"Renegociar acuerdos de trabajo. Muchos conflictos en esta etapa son síntoma de normas que nunca se establecieron."},
     {tag:"Precaución",tc:"#993C1D",tb:"#FAECE7",text:"Evita actividades puramente recreativas ahora: el equipo las vive como distracción del conflicto real."}
   ]},
  {name:"Norming",sub:"Sistemas que sostienen la confianza",ac:"#854F0B",al:"#FEF3E2",ad:"#412402",
   insight:"Este equipo se está estabilizando. Los avances son reales pero frágiles si no se codifican en normas y rituales explícitos que sobrevivan cambios de personas.",
   recs:[
     {tag:"Sesión de trabajo",tc:"#64B450",tb:"#EBF5E6",text:"Taller de normas y rituales: documentar cómo trabajamos, procesos de decisión y protocolos de comunicación."},
     {tag:"Assessment",tc:"#534AB7",tb:"#E5E3FC",text:"DiSC o StrengthsFinder colectivo para ver cómo se complementan los estilos, y qué fricciones son de personalidad, no de mala fe."},
     {tag:"Experiencia",tc:"#854F0B",tb:"#FAEEDA",text:"Reto de mediana complejidad que refuerce la identidad colectiva: innovación interna, reto social o experiencia con roles cruzados."}
   ]},
  {name:"Performing",sub:"Reto antes que comodidad",ac:"#64B450",al:"#E1F5EE",ad:"#4A8A39",
   insight:"Este equipo ejecuta bien. El siguiente reto es pasar de rendimiento a seguridad psicológica real: donde el equipo puede decir verdades difíciles sin costo.",
   recs:[
     {tag:"Sesión de trabajo",tc:"#534AB7",tb:"#E5E3FC",text:"Feedback 360 y retrospectiva profunda: revisar patrones del equipo, no solo resultados de productividad."},
     {tag:"Experiencia",tc:"#854F0B",tb:"#FAEEDA",text:"Reto de alta complejidad con debriefing: hackathon, design sprint o simulación de crisis."},
     {tag:"Assessment",tc:"#14A0B4",tb:"#E3F5F8",text:"Working Genius (Lencioni) para identificar cómo cada persona contribuye al trabajo colectivo y dónde hay energía desperdiciada."}
   ]},
  {name:"High Performing",sub:"Seguridad psicológica como marcador clave",ac:"#14A0B4",al:"#E6F1FB",ad:"#0C7A8A",
   insight:"Este equipo ha alcanzado confianza y seguridad psicológica reales. El foco ahora es sostenerlo y expandir su impacto hacia otros equipos y hacia la organización.",
   recs:[
     {tag:"Sesión de trabajo",tc:"#534AB7",tb:"#E5E3FC",text:"Auditoría de seguridad psicológica (Edmondson Scale) para identificar zonas de autocensura o asimetría que aún no se ven."},
     {tag:"Sesión de trabajo",tc:"#64B450",tb:"#EBF5E6",text:"Sesión de visión de legado: qué queremos que digan de este equipo en 3 años. Future-back visioning."},
     {tag:"Multiplicador",tc:"#534AB7",tb:"#E5E3FC",text:"Diseñar cómo este equipo puede servir a otros: comunidad de práctica, mentoría a equipos más jóvenes, exportar sus normas."}
   ]},
  {name:"Generative",sub:"Equipos que multiplican impacto hacia afuera",ac:"#534AB7",al:"#EEEDFE",ad:"#26215C",
   insight:"Este equipo opera más allá de sí mismo. El trabajo ahora es institucionalizar esa generatividad, documentarla y formalizarla, para que sobreviva cambios y rotaciones.",
   recs:[
     {tag:"Multiplicador",tc:"#534AB7",tb:"#E5E3FC",text:"Formalizar el rol multiplicador: programas de mentoría, playbooks de cultura o comunidades de práctica con otros equipos."},
     {tag:"Sesión de trabajo",tc:"#64B450",tb:"#EBF5E6",text:"Succession y knowledge transfer: documentar el ADN del equipo para que el conocimiento no se vaya cuando se va una persona."},
     {tag:"Experiencia",tc:"#14A0B4",tb:"#E3F5F8",text:"Proyecto de impacto colectivo: voluntariado significativo, colaboración con otra organización o iniciativa de transferencia de conocimiento."}
   ]}
];

const GAP_INSIGHT="Este equipo tiene fortalezas reales en cómo se relaciona y opera. Sin embargo, aún no ha construido las prácticas deliberadas que convierten esas fortalezas en algo sostenible, que funciona incluso cuando cambia la gente. Esa es exactamente la diferencia entre un equipo naturalmente bueno y uno intencionalmente desarrollado.";

let cur=-1, ans=[], pracAns=[], userName='', companyName='', teamName='', showingResults=false;

function scores(){
  const s={trust:0,conflict:0,clarity:0,cohesion:0,psafety:0,impact:0};
  const c={trust:0,conflict:0,clarity:0,cohesion:0,psafety:0,impact:0};
  ans.forEach((v,i)=>{s[Qs[i].dim]+=v;c[Qs[i].dim]++;});
  Object.keys(s).forEach(k=>{if(c[k])s[k]=s[k]/c[k];});
  return s;
}

function pracScore(){
  const map={3:3,2:1.5,1:0};
  return pracAns.reduce((sum,v)=>sum+(map[v]||0),0);
}

function getRawStage(s){
  const avg=(s.trust+s.conflict+s.clarity+s.cohesion+s.psafety+s.impact)/6;
  if(s.trust<2.5&&s.clarity<2.5)return 0;
  if(s.trust<2.8||s.conflict<2.5)return 1;
  if(avg<3.2||s.cohesion<3)return 2;
  if(s.psafety<3.8||avg<3.8)return 3;
  if(s.impact<3.5)return 4;
  return 5;
}

function getCeiling(ps){
  if(ps<4)return 2;
  if(ps<9)return 3;
  if(ps<13)return 4;
  return 5;
}

function getStage(s){
  return Math.min(getRawStage(s),getCeiling(pracScore()));
}

function isGapped(s){
  return getRawStage(s)>getCeiling(pracScore());
}

function getBlocker(s){return Object.entries(s).reduce((a,b)=>b[1]<a[1]?b:a)[0];}
function pct(v){return Math.round((v-1)/4*100)+'%';}

function allPracAnswered(){return pracAns.length===Ps.length&&pracAns.every(v=>v>0);}

function generatePDF(){
  const btn=document.getElementById('pdf-btn');
  btn.classList.add('loading');
  btn.textContent='Generando...';
  setTimeout(()=>{
    try{
      const {jsPDF}=window.jspdf;
      const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'letter'});
      const PW=215.9,PH=279.4;
      const s=scores();
      const si=getStage(s);
      const st=STAGES[si];
      const gapped=isGapped(s);
      const bl=getBlocker(s);
      const bld=DIMS[bl];
      const date=new Date().toLocaleDateString('es-PR',{year:'numeric',month:'long',day:'numeric'});
      const hex=h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return[r,g,b];};
      const sf=h=>doc.setFillColor(...hex(h));
      const st2=h=>doc.setTextColor(...hex(h));
      const sd=h=>doc.setDrawColor(...hex(h));

      sf('#282828');doc.rect(0,0,PW,26,'F');
      sf('#64B450');doc.rect(0,0,PW,4,'F');
      try{
        const logoEl=document.getElementById('logo-img');
        if(logoEl&&logoEl.complete&&logoEl.naturalWidth>0){
          const c=document.createElement('canvas');
          c.width=logoEl.naturalWidth;c.height=logoEl.naturalHeight;
          c.getContext('2d').drawImage(logoEl,0,0);
          doc.addImage(c.toDataURL('image/png'),'PNG',8,6,36,13);
        }
      }catch(_){}
      doc.setFont('helvetica','normal');doc.setFontSize(8);
      st2('#94A3B8');doc.text('Team Development Model',12,22);
      doc.setFont('helvetica','italic');doc.setFontSize(7.5);
      doc.text('Where teams grow together. And move forward.',PW-12,22,'right');

      let y=36;
      doc.setFont('helvetica','bold');doc.setFontSize(19);
      st2('#282828');doc.text('Diagnostico de Equipo',12,y);
      y+=7;
      doc.setFont('helvetica','normal');doc.setFontSize(9.5);
      st2('#6B7280');
      const parts=[userName,companyName,teamName].filter(Boolean);
      if(parts.length){doc.text(parts.join(' · '),12,y);y+=5;}
      doc.text(date,12,y);y+=8;

      sf(st.al);doc.roundedRect(12,y,PW-24,26,3,3,'F');
      sf(st.ac);doc.roundedRect(12,y,PW-24,4,2,2,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(12);
      st2(st.ac);doc.text('0'+(si+1)+' · '+st.name,18,y+12);
      doc.setFont('helvetica','normal');doc.setFontSize(9);
      st2(st.ad);doc.text(st.sub,18,y+20);
      y+=32;

      sf('#F5F5F5');doc.roundedRect(12,y,PW-24,20,2,2,'F');
      doc.setFont('helvetica','italic');doc.setFontSize(8.5);
      st2('#374151');
      const iLines=doc.splitTextToSize(st.insight,PW-32);
      doc.text(iLines,18,y+7);
      y+=26;

      if(gapped){
        const gLines=doc.splitTextToSize(GAP_INSIGHT,PW-36);
        const gH=gLines.length*4.5+16;
        sf('#EBF5E6');doc.roundedRect(12,y,PW-24,gH,2,2,'F');
        sf('#64B450');doc.rect(12,y,3,gH,'F');
        doc.setFont('helvetica','italic');doc.setFontSize(8);
        st2('#374151');doc.text(gLines,20,y+8);
        y+=gH+6;
      }

      doc.setFont('helvetica','bold');doc.setFontSize(9);
      st2('#6B7280');doc.text('PERFIL DE DIMENSIONES',12,y);
      y+=4;sd('#E5E7EB');doc.setLineWidth(0.3);doc.line(12,y,PW-12,y);y+=5;
      const barW=PW-24-40;
      Object.entries(s).forEach(([k,v])=>{
        const d=DIMS[k];
        doc.setFont('helvetica','normal');doc.setFontSize(8.5);
        st2('#111');doc.text(d.label,12,y+3.5);
        doc.setFont('helvetica','bold');st2(d.color);
        doc.text(v.toFixed(1)+'/5',PW-12,y+3.5,'right');
        sf('#E5E7EB');doc.roundedRect(12,y+5,barW,3.5,1,1,'F');
        const fw=(v-1)/4*barW;
        if(fw>0){sf(d.color);doc.roundedRect(12,y+5,fw,3.5,1,1,'F');}
        y+=14;
      });
      y+=4;

      doc.setFont('helvetica','bold');doc.setFontSize(9);
      st2('#6B7280');doc.text('FACTOR CRITICO',12,y);
      y+=5;
      const bLines=doc.splitTextToSize(BLOCKERS[bl],PW-36);
      const bH=bLines.length*4.5+16;
      sf(bld.bg);doc.roundedRect(12,y,PW-24,bH,2,2,'F');
      sf(bld.color);doc.rect(12,y,3,bH,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(8.5);
      st2(bld.color);doc.text(bld.label,20,y+8);
      doc.setFont('helvetica','normal');doc.setFontSize(8);
      doc.text(bLines,20,y+14);
      y+=bH+6;

      doc.setFont('helvetica','bold');doc.setFontSize(9);
      st2('#6B7280');doc.text('PROXIMOS PASOS RECOMENDADOS',12,y);
      y+=4;sd('#E5E7EB');doc.line(12,y,PW-12,y);y+=5;
      st.recs.forEach(r=>{
        const rLines=doc.splitTextToSize(r.text,PW-52);
        const rH=rLines.length*4.5+14;
        sf('#FFFFFF');sd('#E5E7EB');doc.setLineWidth(0.3);
        doc.roundedRect(12,y,PW-24,rH,2,2,'FD');
        sf(r.tb);doc.roundedRect(16,y+4,22,7,1.5,1.5,'F');
        doc.setFont('helvetica','bold');doc.setFontSize(6);
        st2(r.tc);doc.text(r.tag,27,y+8.5,'center');
        doc.setFont('helvetica','normal');doc.setFontSize(8.5);
        st2('#374151');doc.text(rLines,42,y+9);
        y+=rH+3;
      });

      sf('#282828');doc.rect(0,PH-12,PW,12,'F');
      doc.setFont('helvetica','normal');doc.setFontSize(7.5);
      st2('#94A3B8');
      doc.text('CenterPoint · Team Development Model · centerpointpr.com',PW/2,PH-5,'center');

      const nameParts=[teamName,companyName].filter(Boolean);
      const fname='CenterPoint_Diagnostico'+(nameParts.length?'_'+nameParts[0].replace(/\s+/g,'_'):'')+'.pdf';
      doc.save(fname);
    }catch(e){
      console.error(e);
      alert('Error generando el PDF. Por favor intenta de nuevo.');
    }
    btn.classList.remove('loading');
    btn.innerHTML='&#8595; Descargar PDF';
  },120);
}

function render(){
  const app=document.getElementById('app');
  const totalQ=Qs.length+1;

  if(cur===-1){
    app.innerHTML=`<div class="screen on">
      <div class="intro-logo"><img src="CP%20logo.png" style="height:38px;display:block"></div>
      <div class="intro-title">Diagnóstico de equipo</div>
      <div class="intro-sub">Dos partes: 12 preguntas sobre cómo opera tu equipo, y 5 sobre las prácticas que ha construido. Menos de 5 minutos.</div>
      <div class="intro-note">Responde como líder o responsable del equipo, basándote en lo que observas en tu gente, no en cómo te sientes tú personalmente. No hay respuestas correctas o incorrectas: lo que importa es la realidad actual, no el ideal.</div>
      <div class="field-group">
        <div class="field-label">Tu nombre</div>
        <input class="field-input" id="f-name" type="text" placeholder="" autocomplete="name">
      </div>
      <div class="field-group">
        <div class="field-label">Organización</div>
        <input class="field-input" id="f-company" type="text" placeholder="">
      </div>
      <div class="field-group">
        <div class="field-label">Equipo o departamento</div>
        <input class="field-input" id="f-team" type="text" placeholder="">
      </div>
      <button class="start-btn" style="background:#64B450" onclick="start()">Comenzar diagnóstico →</button>
    </div>`;

  } else if(cur<Qs.length){
    const q=Qs[cur];
    const pctW=Math.round(cur/totalQ*100)+'%';
    const d=DIMS[q.dim];
    app.innerHTML=`<div class="screen on">
      <button class="back-btn" onclick="goBack()">&#8592; Atrás</button>
      <div class="prog-wrap"><div class="prog-fill" style="width:${pctW};background:#64B450"></div></div>
      <div class="q-meta">Pregunta ${cur+1} de ${Qs.length} <span class="q-dim-badge" style="background:${d.bg};color:${d.color}">${d.label}</span></div>
      <div class="q-text">${q.q}</div>
      <div class="scale-ends"><span>Casi nunca</span><span>Siempre</span></div>
      <div class="scale-btns">${[1,2,3,4,5].map(v=>`<button class="sbtn" id="b${v}" onclick="pick(${v})">${v}</button>`).join('')}</div>
    </div>`;

  } else {
    const answered=allPracAnswered();
    const pctW=Math.round(Qs.length/totalQ*100)+'%';
    const rows=Ps.map((q,i)=>{
      const val=pracAns[i]||0;
      return`<tr>
        <td class="prac-num">${i+1}</td>
        <td class="prac-q">${q}</td>
        <td class="prac-btns-cell">
          <button class="pbtn${val===3?' sel':''}" onclick="setPrac(${i},3)">Sí</button>
          <button class="pbtn${val===2?' sel':''}" onclick="setPrac(${i},2)">Parcial</button>
          <button class="pbtn${val===1?' sel':''}" onclick="setPrac(${i},1)">No</button>
        </td>
      </tr>`;
    }).join('');

    app.innerHTML=`<div class="screen on">
      <button class="back-btn" onclick="goBack()">&#8592; Atrás</button>
      <div class="prog-wrap"><div class="prog-fill" style="width:${pctW};background:#64B450"></div></div>
      <div class="prac-screen-title">Segunda parte · Prácticas del equipo</div>
      <div class="prac-screen-note">Ahora, preguntas sobre lo que el equipo ha hecho, no cómo se siente, sino qué existe o qué ha ocurrido.</div>
      <table class="prac-table"><tbody>${rows}</tbody></table>
      <button class="start-btn" id="ver-btn" style="background:${answered?'#64B450':'#ccc'};margin-top:20px" onclick="verResultados()" ${answered?'':'disabled'}>Ver resultados →</button>
    </div>`;
  }
}

function renderResultados(){
  const app=document.getElementById('app');
  const s=scores();
  const si=getStage(s);
  const st=STAGES[si];
  const gapped=isGapped(s);
  const bl=getBlocker(s);
  const bld=DIMS[bl];
  const displayName=[companyName,teamName].filter(Boolean).join(' · ');
  app.innerHTML=`<div class="screen on">
    <button class="back-btn" onclick="goBack()">&#8592; Atrás</button>
    <div style="margin-bottom:16px">
      ${displayName?`<div style="font-size:11px;color:var(--t3);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.04em">${displayName}</div>`:''}
      <span class="res-badge" style="background:${st.al};color:${st.ad}">0${si+1} · ${st.name}</span>
      <div class="res-name">${st.name}</div>
      <div class="res-sub">${st.sub}</div>
      <div class="res-insight">${st.insight}</div>
      ${gapped?`<div class="res-gap">${GAP_INSIGHT}</div>`:''}
    </div>
    <div class="card">
      <div class="card-title">Perfil de dimensiones</div>
      ${Object.entries(s).map(([k,v])=>{const d=DIMS[k];return`<div class="dim-row">
        <div class="dim-hd"><span class="dim-lbl">${d.label}</span><span class="dim-sc">${v.toFixed(1)} / 5</span></div>
        <div class="dim-bg"><div class="dim-fill" id="df-${k}" style="width:0;background:${d.color}"></div></div>
      </div>`;}).join('')}
    </div>
    <div class="blocker-card" style="background:${bld.bg};border-color:${bld.color}">
      <div class="blocker-label" style="color:${bld.color}">Factor crítico · ${bld.label}</div>
      <div class="blocker-text" style="color:${bld.color}">${BLOCKERS[bl]}</div>
    </div>
    <div class="card">
      <div class="card-title">Próximos pasos recomendados</div>
      ${st.recs.map(r=>`<div class="rec-item">
        <span class="rec-tag" style="background:${r.tb};color:${r.tc}">${r.tag}</span>
        <span>${r.text}</span>
      </div>`).join('')}
    </div>
    <div class="field-group" style="margin-top:20px">
      <div class="field-label">Recibe tu resultado por email</div>
      <input class="field-input" id="res-email" type="email" placeholder="Ej: maria@empresa.com" autocomplete="email">
    </div>
    <div class="btn-row">
      <button class="cta-btn" style="background:${st.ac}">Conversemos →</button>
      <button class="pdf-btn" id="pdf-btn" onclick="enviarPDF()">Enviar PDF al email →</button>
    </div>
    <button class="restart-btn" onclick="restart()">Volver a empezar</button>
    <div class="footer">CenterPoint · Team Development Model</div>
  </div>`;
  setTimeout(()=>{
    Object.entries(s).forEach(([k,v])=>{
      const el=document.getElementById('df-'+k);
      if(el)el.style.width=pct(v);
    });
  },100);
}

function saveDiagnostic(s, si, st, gapped){
  fetch('/.netlify/functions/save-diagnostic', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      name: userName||null,
      org: [companyName,teamName].filter(Boolean).join(' · ')||null,
      stage: st.name,
      stageIndex: si,
      scores: s,
      gapped: !!gapped,
      action: 'save'
    })
  }).catch(()=>{});
}
function enviarPDF(){
  const emailEl=document.getElementById('res-email');
  const email=(emailEl?.value||'').trim();
  if(!email||!email.includes('@')){emailEl?.focus();return;}
  const btn=document.getElementById('pdf-btn');
  btn.textContent='Enviando...';btn.disabled=true;
  const s=scores();
  const si=getStage(s);
  const st=STAGES[si];
  fetch('/.netlify/functions/save-diagnostic',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      name: userName||null,
      org: [companyName,teamName].filter(Boolean).join(' · ')||null,
      email: email,
      stage: st.name,
      stageIndex: si,
      scores: s,
      gapped: isGapped(s),
      action: 'email'
    })
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.ok){btn.textContent='✓ Enviado';btn.style.cssText='background:#64B450;color:#fff;border-color:#64B450;cursor:default';}
    else{btn.textContent='Error — intenta de nuevo';btn.disabled=false;}
  })
  .catch(()=>{btn.textContent='Error — intenta de nuevo';btn.disabled=false;});
}
function start(){
  userName=document.getElementById('f-name')?.value.trim()||'';
  companyName=document.getElementById('f-company')?.value.trim()||'';
  teamName=document.getElementById('f-team')?.value.trim()||'';
  cur=0;render();
}
function pick(v){
  const colors={1:"#993C1D",2:"#854F0B",3:"#888780",4:"#64B450",5:"#14A0B4"};
  const btn=document.getElementById('b'+v);
  if(btn){btn.style.cssText=`background:${colors[v]};border-color:${colors[v]};color:#fff`;}
  setTimeout(()=>{ans.push(v);cur++;render();},220);
}
function setPrac(i,v){
  pracAns[i]=v;
  render();
}
function goBack(){
  if(showingResults){showingResults=false;render();return;}
  if(cur>Qs.length){cur=Qs.length;render();return;}
  if(cur===Qs.length){cur=Qs.length-1;ans.pop();render();return;}
  if(cur>0){cur--;ans.pop();render();return;}
  if(cur===0){cur=-1;ans=[];render();}
}
function verResultados(){
  if(allPracAnswered()){
    showingResults=true;
    renderResultados();
  }
}
function restart(){cur=-1;ans=[];pracAns=[];userName='';companyName='';teamName='';showingResults=false;render();}
render();
</script>
</body>
</html>
